# Chain preset: Pepecoin (sourced by ../seederctl.sh)
# Params taken from pepecoincore/src/chainparams.cpp + version.h and the live daemon
# (/pepetoshi:1.1.0/, protocolversion 70016, MIN_PEER_PROTO_VERSION 70003).

CHAIN="pepecoin"
# Network magic / message-start bytes, 4 hex bytes (no spaces).
MAGIC="c0a0f0e0"
# P2P port peers listen on.
P2PORT="33874"
# Minimum block height for a peer to be served as "good" (tip ~1.09M in 2026).
MINHEIGHT="1080000"
# Minimum peer protocol version to serve (Pepecoin MIN_PEER_PROTO_VERSION = 70003).
MINVERSION="70003"
# Bootstrap seeds (space-separated) — chainparams DNS seeds + a couple of live IPs.
SEEDS="seeds.pepecoin.org seeds.pepeblocks.com 65.109.147.252 64.227.69.247"

# --- DNS seed mode (optional). Leave HOST/NS empty for crawler-only. ---
# DNS name this seeder answers for, e.g. seed.pepecoin.org.
HOST=""
# Public hostname of THIS server (the NS-record target).
NS=""
# Contact e-mail for SOA records, '@' -> '.'.
MBOX=""
# UDP port for the DNS server. NOTE: distinct from wojakcoin's so both can run on
# one host; for real DNS you still need port 53 (see README multi-chain DNS notes).
DNSPORT="5302"
# Address to listen on ("::" = all). Set a chain-specific IP for port-53 DNS on a
# multi-IP server.
LISTEN="::"
# Crawler threads.
THREADS="64"
