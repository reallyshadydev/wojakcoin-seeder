# Chain preset: WojakCoin (sourced by ../seederctl.sh)
# Params taken from wojakcore/src/chainparams.cpp + version.h.

CHAIN="wojakcoin"
# Network magic / message-start bytes, 4 hex bytes (no spaces).
MAGIC="6f8da579"
# P2P port peers listen on.
P2PORT="20759"
# Minimum block height for a peer to be served as "good" (tip ~139k in 2026).
MINHEIGHT="130000"
# Minimum peer protocol version to serve (wojak net is 70012; 70001 is inclusive).
MINVERSION="70001"
# Bootstrap seeds (space-separated IPs/hostnames) — chainparams fixed seeds + DNS seed.
SEEDS="103.133.25.201 159.223.90.59 207.244.232.43 wojak-seed.s3na.xyz"

# --- DNS seed mode (optional). Leave HOST/NS empty for crawler-only. ---
# DNS name this seeder answers for, e.g. seed.wojakcoin.org.
HOST=""
# Public hostname of THIS server (the NS-record target).
NS=""
# Contact e-mail for SOA records, '@' -> '.'.
MBOX=""
# UDP port for the DNS server (53 in production). One server/IP can only run ONE
# DNS seed on port 53 — see README "Multi-chain DNS on one server".
DNSPORT="53"
# Address to listen on ("::" = all). Bind to a chain-specific IP to run several
# DNS seeds on port 53 from one box with multiple IPs.
LISTEN="::"
# Crawler threads.
THREADS="64"
