# WojakCoin seeder configuration (single server). Sourced by ./seederctl.sh.
#
# Two modes, decided by whether HOST/NS are set:
#   * crawler-only : leave HOST/NS empty. Crawls the network and writes
#                    data/dnsseed.dump. Feed that to tools/export-chainparams-seeds.py
#                    to refresh the IP seeds in chainparams. No domain needed.
#   * DNS seed     : set HOST + NS (+ MBOX). Serves live peers over DNS so a fresh
#                    wojakcoind that looks up HOST gets back many node IPs. Requires
#                    HOST to be delegated to this server (see README "DNS delegation").

# The DNS name this seeder answers for, e.g. seed.wojakcoin.org. Empty = crawler-only.
HOST=""
# Public hostname of THIS server (the NS-record target), e.g. vps.wojakcoin.org.
NS=""
# Contact e-mail for SOA records, with '@' replaced by '.', e.g. admin.wojakcoin.org.
MBOX=""

# UDP port for the DNS server. 53 in production (needs root or setcap; see README).
DNSPORT="53"
# Address to listen on ("::" = all IPv4+IPv6).
LISTEN="::"
# Parallel crawler threads.
THREADS="64"
# Minimum block height for a peer to be served as "good" (wojak tip ~139k in 2026).
MINHEIGHT="130000"
# Extra bootstrap seeds (space-separated IPs/hosts) added to the built-in defaults.
# A local node is a great extra seed if wojakcoind runs on this box:
#   EXTRA_SEEDS="127.0.0.1"
EXTRA_SEEDS=""
