# multicoin-seeder configuration.
# One [section] per chain. ALL chains run together in a SINGLE dnsseed process.
#
# Each chain is crawler-only until you fill in host/ns/mbox, at which point it also
# serves DNS. State for each chain lives in data/<name>/.
#
# Keys: magic (8 hex), port, minheight, minversion, seeds (space-separated),
#       host, ns, mbox, dnsport (default 53), listen (default ::).

[wojakcoin]
magic      = 6f8da579
port       = 20759
minheight  = 130000
minversion = 70001
seeds      = 103.133.25.201 159.223.90.59 207.244.232.43 wojak-seed.s3na.xyz
host       =
ns         =
mbox       =
dnsport    = 53
listen     = ::

[pepecoin]
magic      = c0a0f0e0
port       = 33874
minheight  = 1080000
minversion = 70003
seeds      = seeds.pepecoin.org seeds.pepeblocks.com 65.109.147.252 64.227.69.247
host       =
ns         =
mbox       =
dnsport    = 53
listen     = ::

# To add another coin, run (reads magic/port/seeds from the coin's source):
#   ./seederctl.sh add <name> --src /path/to/coin-source
# ...or add a [section] by hand. Only magic + port + seeds are required;
# minheight and minversion are optional (omit to disable that filter):
#
# [mycoin]
# magic = aabbccdd        # 4 message-start bytes from chainparams.cpp
# port  = 12345           # nDefaultPort
# seeds = seed.mycoin.org 1.2.3.4
